<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colossal Book Manager</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        color: white;
        text-align: center;
        margin-bottom: 30px;
        font-size: 2.5rem;
      }

      .auth-section {
        background: white;
        border-radius: 12px;
        padding: 30px;
        margin-bottom: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .auth-section.hidden {
        display: none;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: #333;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
      }

      button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
      }

      button:hover {
        transform: translateY(-2px);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-secondary {
        background: #6c757d;
        margin-left: 10px;
      }

      .btn-danger {
        background: #dc3545;
      }

      .user-info {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
      }

      .books-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      .book-card {
        background: white;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s;
      }

      .book-card:hover {
        transform: translateY(-5px);
      }

      .book-title {
        font-size: 1.2rem;
        font-weight: 700;
        color: #333;
        margin-bottom: 10px;
      }

      .book-info {
        color: #666;
        margin-bottom: 5px;
      }

      .book-price {
        font-size: 1.5rem;
        font-weight: 700;
        color: #667eea;
        margin: 10px 0;
      }

      .book-actions {
        margin-top: 15px;
        display: flex;
        gap: 10px;
      }

      .book-actions button {
        flex: 1;
        padding: 8px;
        font-size: 12px;
      }

      .message {
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 15px;
      }

      .message.success {
        background: #d4edda;
        color: #155724;
      }

      .message.error {
        background: #f8d7da;
        color: #721c24;
      }

      .form-row {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Colossal Book Manager</h1>

      <!-- Login Section -->
      <div id="loginSection" class="auth-section">
        <h2>Login</h2>
        <div id="loginMessage"></div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="loginPassword"
            placeholder="yourpassword"
          />
        </div>
        <button onclick="login()">Login</button>
      </div>

      <!-- Main App Section -->
      <div id="appSection" class="auth-section hidden">
        <div class="user-info">
          <strong>Logged in as:</strong> <span id="userEmail"></span>
          <button onclick="logout()" class="btn-secondary" style="float: right">
            Logout
          </button>
        </div>

        <div id="appMessage"></div>

        <!-- Add/Edit Book Form -->
        <h2 id="formTitle">Add New Book</h2>
        <form id="bookForm" onsubmit="saveBook(event)">
          <input type="hidden" id="bookId" />

          <div class="form-group">
            <label>Title *</label>
            <input type="text" id="bookTitle" required />
          </div>

          <div class="form-group">
            <label>Author *</label>
            <input type="text" id="bookAuthor" required />
          </div>

          <div class="form-group">
            <label>Publisher</label>
            <input type="text" id="bookPublisher" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Price *</label>
              <input
                type="number"
                id="bookPrice"
                step="0.01"
                min="0"
                required
              />
            </div>

            <div class="form-group">
              <label>Currency *</label>
              <select id="bookCurrency" required>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="GBP">GBP</option>
                <option value="JPY">JPY</option>
              </select>
            </div>
          </div>

          <button type="submit" id="submitBtn">Add Book</button>
          <button
            type="button"
            onclick="cancelEdit()"
            class="btn-secondary"
            id="cancelBtn"
            style="display: none"
          >
            Cancel
          </button>
        </form>

        <!-- Books List -->
        <h2 style="margin-top: 30px">Books</h2>
        <div id="booksList" class="books-grid"></div>
      </div>
    </div>

    <script>
      const API_BASE = "https://api.ryanmorales.info/colossal/api";
      let accessToken = "";
      let refreshToken = "";
      let currentUser = {};

      // Login
      async function login() {
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;

        try {
          const response = await fetch(`${API_BASE}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (response.ok) {
            accessToken = data.access_token;
            refreshToken = data.refresh_token;
            currentUser = data.user;

            document.getElementById("loginSection").classList.add("hidden");
            document.getElementById("appSection").classList.remove("hidden");
            document.getElementById("userEmail").textContent =
              currentUser.email;

            loadBooks();
          } else {
            showMessage("loginMessage", data.error, "error");
          }
        } catch (error) {
          showMessage(
            "loginMessage",
            "Login failed: " + error.message,
            "error",
          );
        }
      }

      // Logout
      function logout() {
        accessToken = "";
        refreshToken = "";
        currentUser = {};
        document.getElementById("loginSection").classList.remove("hidden");
        document.getElementById("appSection").classList.add("hidden");
        document.getElementById("booksList").innerHTML = "";
      }

      // Load Books
      async function loadBooks() {
        try {
          const response = await fetch(`${API_BASE}/books`);
          const books = await response.json();

          const booksList = document.getElementById("booksList");
          booksList.innerHTML = books
            .map(
              (book) => `
                    <div class="book-card">
                        <div class="book-title">${book.title}</div>
                        <div class="book-info">by ${book.author}</div>
                        ${book.publisher ? `<div class="book-info">${book.publisher}</div>` : ""}
                        <div class="book-price">${book.price.toFixed(2)} ${book.currency}</div>
                        <div class="book-actions">
                            <button onclick="editBook(${book.ID})">Edit</button>
                            <button onclick="deleteBook(${book.ID})" class="btn-danger">Delete</button>
                        </div>
                    </div>
                `,
            )
            .join("");
        } catch (error) {
          showMessage(
            "appMessage",
            "Failed to load books: " + error.message,
            "error",
          );
        }
      }

      // Save Book (Create or Update)
      async function saveBook(event) {
        event.preventDefault();

        const bookId = document.getElementById("bookId").value;
        const book = {
          title: document.getElementById("bookTitle").value,
          author: document.getElementById("bookAuthor").value,
          publisher: document.getElementById("bookPublisher").value,
          price: parseFloat(document.getElementById("bookPrice").value),
          currency: document.getElementById("bookCurrency").value,
        };

        const url = bookId
          ? `${API_BASE}/books/${bookId}`
          : `${API_BASE}/books`;
        const method = bookId ? "PUT" : "POST";

        try {
          const response = await fetch(url, {
            method,
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${accessToken}`,
            },
            body: JSON.stringify(book),
          });

          const data = await response.json();

          if (response.ok) {
            showMessage("appMessage", data.message, "success");
            document.getElementById("bookForm").reset();
            document.getElementById("bookId").value = "";
            document.getElementById("formTitle").textContent = "Add New Book";
            document.getElementById("submitBtn").textContent = "Add Book";
            document.getElementById("cancelBtn").style.display = "none";
            loadBooks();
          } else {
            showMessage(
              "appMessage",
              data.error || "Failed to save book",
              "error",
            );
          }
        } catch (error) {
          showMessage("appMessage", "Error: " + error.message, "error");
        }
      }

      // Edit Book
      async function editBook(id) {
        try {
          const response = await fetch(`${API_BASE}/books/${id}`);
          const book = await response.json();

          document.getElementById("bookId").value = book.ID;
          document.getElementById("bookTitle").value = book.title;
          document.getElementById("bookAuthor").value = book.author;
          document.getElementById("bookPublisher").value = book.publisher || "";
          document.getElementById("bookPrice").value = book.price;
          document.getElementById("bookCurrency").value = book.currency;

          document.getElementById("formTitle").textContent = "Edit Book";
          document.getElementById("submitBtn").textContent = "Update Book";
          document.getElementById("cancelBtn").style.display = "inline-block";

          window.scrollTo({ top: 0, behavior: "smooth" });
        } catch (error) {
          showMessage(
            "appMessage",
            "Failed to load book: " + error.message,
            "error",
          );
        }
      }

      // Cancel Edit
      function cancelEdit() {
        document.getElementById("bookForm").reset();
        document.getElementById("bookId").value = "";
        document.getElementById("formTitle").textContent = "Add New Book";
        document.getElementById("submitBtn").textContent = "Add Book";
        document.getElementById("cancelBtn").style.display = "none";
      }

      // Delete Book
      async function deleteBook(id) {
        if (!confirm("Are you sure you want to delete this book?")) return;

        try {
          const response = await fetch(`${API_BASE}/books/${id}`, {
            method: "DELETE",
            headers: {
              Authorization: `Bearer ${accessToken}`,
            },
          });

          const data = await response.json();

          if (response.ok) {
            showMessage("appMessage", data.message, "success");
            loadBooks();
          } else {
            showMessage(
              "appMessage",
              data.error || "Failed to delete book",
              "error",
            );
          }
        } catch (error) {
          showMessage("appMessage", "Error: " + error.message, "error");
        }
      }

      // Show Message
      function showMessage(elementId, message, type) {
        const messageEl = document.getElementById(elementId);
        messageEl.innerHTML = `<div class="message ${type}">${message}</div>`;
        setTimeout(() => (messageEl.innerHTML = ""), 5000);
      }
    </script>
  </body>
</html>
