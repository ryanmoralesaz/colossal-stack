version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: colossal-postgres
    environment:
      POSTGRES_USER: ryan
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: colossal_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

